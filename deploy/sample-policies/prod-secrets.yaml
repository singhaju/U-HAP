---
# U-HAP sample policy — namespace: prod, resource: secrets
#
# This policy demonstrates the wildcard deny rule.
# It covers correctness scenario S5 from the paper:
#   S5: ANY user attempting to delete a secret in prod is DENIED.

namespace: prod
resource: secrets

rules:
  # Deny — S5: nobody may delete secrets (wildcard deny overrides all allow paths)
  - type: deny
    subject: "*"
    action: delete

  # RBAC — only the 'secret-reader' role can get secrets
  - type: rbac
    role: secret-reader
    action: get

  # ABAC — secrets may be listed if the request is on-premise during business hours
  - type: abac
    action: list
    predicate: "net == 'on-premise' AND time == 'business-hours'"

  # ACL — the 'vault-agent' service account can create secrets
  - type: acl
    subject: vault-agent
    action: create
